<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Contact Form</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
           line-height: 1.6;
           color: #000;
           background-color: #fff;
           padding: 2rem 1rem;
           max-width: 600px;
           margin: 0 auto;
       }

       h1 {
           margin-bottom: 0.5rem;
           font-size: 1.8rem;
       }

       p {
           margin-bottom: 2rem;
           color: #333;
       }

       .form-group {
           margin-bottom: 1.5rem;
       }

       label {
           display: block;
           margin-bottom: 0.5rem;
           font-weight: 600;
       }

       input, textarea {
           width: 100%;
           padding: 0.75rem;
           font-size: 1rem;
           border: 1px solid #ccc;
           border-radius: 4px;
           font-family: inherit;
       }

       input:focus, textarea:focus {
           outline: none;
           border-color: #000;
       }

       small {
           display: block;
           margin-top: 0.25rem;
           color: #666;
           font-size: 0.875rem;
       }

       button {
           background-color: #000;
           color: #fff;
           padding: 1rem 2rem;
           font-size: 1rem;
           font-weight: 600;
           border: none;
           border-radius: 4px;
           cursor: pointer;
           width: 100%;
       }

       button:hover {
           background-color: #333;
       }

       button:disabled {
           background-color: #999;
           cursor: not-allowed;
       }

       #status {
           margin-top: 1.5rem;
           padding: 1rem;
           border-radius: 4px;
           display: none;
       }

       #status.success {
           display: block;
           background-color: #f0f0f0;
           border-left: 4px solid #000;
       }

       #status.error {
           display: block;
           background-color: #fee;
           border-left: 4px solid #c00;
           color: #c00;
       }

       a {
           color: #000;
           text-decoration: underline;
       }
   </style>
</head>
<body>

   <h1>Contact</h1>
   <p>Send a message.</p>

   <form id="contact-form" onsubmit="return false;">
       <div class="form-group">
           <label for="name">Name</label>
           <input type="text" id="name" name="name" required>
       </div>
       
       <div class="form-group">
           <label for="contact-info">Contact Info</label>
           <input type="text" id="contact-info" name="contact-info" 
               placeholder="email@example.com" required>
           <small>How you want to be contacted back.</small>
       </div>
       
       <div class="form-group">
           <label for="message">Comments</label>
           <textarea id="message" name="message" rows="5" placeholder="Your message..." required></textarea>
       </div>
       
       <button type="submit" id="submit-btn">Send Message</button>
   </form>

   <div id="status"></div>

   <script src="https://unpkg.com/nostr-tools@1.17.0/lib/nostr.bundle.js"></script>
   <script>
       // CONFIGURATION: Replace these with your own values
       const RECIPIENT_NPUB = 'npub1c0r3ytrr4afgrlhrhyec6y9wvkckdllx7ul3cfevtsgjqcrhx8tsdzqs7w';
       const RELAYS = [
		'wss://bits.sdbitcoiners.com/nostrrelay/Leug2TNY',
		'wss://relay.damus.io',
		'wss://nos.lol',
		'wss://relay.nostr.band'
           	// Add more relays if desired
       ];

       // Decode npub to hex pubkey
       let RECIPIENT_HEX;
       try {
           const decoded = window.NostrTools.nip19.decode(RECIPIENT_NPUB);
           RECIPIENT_HEX = decoded.data;
       } catch (e) {
           console.error('Invalid npub in configuration');
       }

       document.getElementById('contact-form').addEventListener('submit', async (e) => {
           e.preventDefault();
           
           const submitBtn = document.getElementById('submit-btn');
           const status = document.getElementById('status');
           
           if (!RECIPIENT_HEX) {
               status.innerHTML = '<strong>Configuration error:</strong> Invalid npub.';
               status.className = 'error';
               return;
           }
           
           submitBtn.disabled = true;
           submitBtn.textContent = 'Sending...';
           status.className = '';
           status.style.display = 'none';
           
           try {
               const sk = window.NostrTools.generatePrivateKey();
               const pk = window.NostrTools.getPublicKey(sk);
               
               const formData = {
                   name: document.getElementById('name').value,
                   contact: document.getElementById('contact-info').value,
                   message: document.getElementById('message').value,
                   timestamp: new Date().toISOString(),
                   source: 'littlelink'
               };
               
               const encryptedContent = await window.NostrTools.nip04.encrypt(
                   sk, 
                   RECIPIENT_HEX, 
                   JSON.stringify(formData)
               );
               
               const event = {
                   kind: 4,
                   pubkey: pk,
                   created_at: Math.floor(Date.now() / 1000),
                   tags: [['p', RECIPIENT_HEX]],
                   content: encryptedContent
               };
               
               event.id = window.NostrTools.getEventHash(event);
               event.sig = window.NostrTools.signEvent(event, sk);
               
               let publishedCount = 0;
               const publishPromises = RELAYS.map(relayUrl => {
                   return new Promise((resolve) => {
                       const ws = new WebSocket(relayUrl);
                       let timeout;
                       
                       ws.onopen = () => {
                           ws.send(JSON.stringify(['EVENT', event]));
                           timeout = setTimeout(() => {
                               ws.close();
                               resolve(false);
                           }, 5000);
                       };
                       
                       ws.onmessage = (msg) => {
                           const data = JSON.parse(msg.data);
                           if (data[0] === 'OK' && data[1] === event.id) {
                               clearTimeout(timeout);
                               ws.close();
                               resolve(true);
                           }
                       };
                       
                       ws.onerror = () => {
                           clearTimeout(timeout);
                           ws.close();
                           resolve(false);
                       };
                   });
               });
               
               const results = await Promise.all(publishPromises);
               publishedCount = results.filter(r => r).length;
               
               if (publishedCount > 0) {
                   status.innerHTML = '<strong>Message sent!</strong><br>Published to ' + publishedCount + ' relay(s).';
                   status.className = 'success';
                   document.getElementById('contact-form').reset();
               } else {
                   throw new Error('No relays accepted the message');
               }
               
           } catch (error) {
               console.error(error);
               status.innerHTML = '<strong>Network error.</strong><br>Please try again later.';
               status.className = 'error';
           } finally {
               submitBtn.disabled = false;
               submitBtn.textContent = 'Send Message';
           }
       });
   </script>

</body>
</html>
